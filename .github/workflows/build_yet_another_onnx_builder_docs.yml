name: Build yet-another-onnx-builder documentation

# Manually triggered workflow only. Only the repository owner (xadupre) is
# allowed to actually run the build; any other actor will see the job skipped.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag or SHA) of xadupre/yet-another-onnx-builder to build"
        required: false
        default: "main"
  schedule:
    # Rebuild documentation biweekly (1st and 3rd Monday of each month) so it stays in sync with the source repository.
    - cron: "17 8 1-7,15-21 * 1"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-publish:
    # Only the repository owner is allowed to publish documentation.
    if: github.event_name == 'schedule' || github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout xadupre.github.io
        uses: actions/checkout@v6
        with:
          path: site
          # Full history so that we can rebase on top of any concurrent
          # commits to the default branch before pushing the rebuilt docs.
          fetch-depth: 0

      - name: Checkout yet-another-onnx-builder
        uses: actions/checkout@v6
        with:
          repository: xadupre/yet-another-onnx-builder
          ref: ${{ inputs.ref }}
          path: yet-another-onnx-builder

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install graphviz
        uses: ts-graphviz/setup-graphviz@v2

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Install nightly torch
        run: |
          pip install --pre --upgrade torch torchvision torchaudio \
            --index-url https://download.pytorch.org/whl/nightly/cpu

      - name: Install yet-another-onnx-builder with doc dependencies
        working-directory: yet-another-onnx-builder
        run: |
          pip install -e ".[category_encoders,docs,imblearn,lightgbm,op-db,polars,sklearn,sksurv,spox,statsmodels,tensorflow,torch,transformers,xgboost]"

      - name: pip freeze
        run: pip freeze

      - name: Build documentation
        working-directory: yet-another-onnx-builder
        run: |
          UNITTEST_GOING=0 sphinx-build -b html \
            -D "sphinx_gallery_conf.filename_pattern=/tensorflow/" \
            docs docs/_build/html -j 1
          UNITTEST_GOING=0 sphinx-build -b html docs docs/_build/html -j auto

      - name: Copy documentation into site/docs/yet-another-onnx-builder
        run: |
          rm -rf site/docs/yet-another-onnx-builder
          mkdir -p site/docs/yet-another-onnx-builder
          cp -r yet-another-onnx-builder/docs/_build/html/. site/docs/yet-another-onnx-builder/
          # Disable Jekyll so that files/folders starting with "_" are served by GitHub Pages.
          touch site/docs/yet-another-onnx-builder/.nojekyll

      - name: Commit and push updated documentation
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/yet-another-onnx-builder
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
          else
            built_sha="$(git -C ../yet-another-onnx-builder rev-parse HEAD)"
            git commit -m "Update yet-another-onnx-builder documentation (from ${built_sha})"
            # Retry the push a few times, rebasing on top of any new commits
            # that may have landed on the remote in the meantime. This avoids
            # "fetch first" / non-fast-forward push failures when another
            # workflow run pushed to the same branch concurrently.
            branch="${GITHUB_REF_NAME:-main}"
            attempts=5
            for i in $(seq 1 "$attempts"); do
              if git push origin "HEAD:${branch}"; then
                echo "Push succeeded on attempt ${i}."
                exit 0
              fi
              echo "Push attempt ${i} failed; rebasing on origin/${branch} and retrying..."
              # Drop any leftover working-tree or untracked changes so that
              # the rebase below does not abort with "cannot rebase: You
              # have unstaged changes." Everything we want to publish has
              # already been committed above, so any remainder is safe to
              # set aside.
              git stash push --include-untracked --quiet -- || true
              git fetch origin "${branch}"
              # Rebase our single doc commit on top of the latest remote state.
              # Prefer our version for the generated docs directory in case of
              # conflicts, since we just rebuilt it.
              if ! git rebase -X ours "origin/${branch}"; then
                echo "Rebase failed; aborting."
                git rebase --abort || true
                exit 1
              fi
              sleep $((i * 5))
            done
            echo "Failed to push after ${attempts} attempts." >&2
            exit 1
          fi
