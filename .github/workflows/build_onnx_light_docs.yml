name: Build onnx-light documentation

# Manually triggered workflow only. Only the repository owner (xadupre) is
# allowed to actually run the build; any other actor will see the job skipped.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag or SHA) of xadupre/onnx-light to build"
        required: false
        default: "main"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-publish:
    # Only the repository owner is allowed to publish documentation.
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout xadupre.github.io
        uses: actions/checkout@v6
        with:
          path: site
          # Full history so that we can rebase on top of any concurrent
          # commits to the default branch before pushing the rebuilt docs.
          fetch-depth: 0

      - name: Checkout onnx-light
        uses: actions/checkout@v6
        with:
          repository: xadupre/onnx-light
          ref: ${{ inputs.ref }}
          path: onnx-light

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install graphviz
        uses: ts-graphviz/setup-graphviz@v2

      - name: Install system dependencies
        run: sudo apt-get install -y doxygen

      - name: Install onnx-light with doc dependencies
        working-directory: onnx-light
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=4
          pip install -e ".[docs]" -v

      - name: pip freeze
        run: pip freeze

      # The C++ examples are built one by one so that each example shows up as
      # its own step in the workflow logs. The per-example build scripts are
      # invoked with a shared install prefix and lib build directory (matching
      # the defaults used by examples/build.sh), so onnx_light is only
      # compiled once by the first example and then reused by every
      # subsequent example.
      - name: Build C++ example - load_onnx_light_time
        working-directory: onnx-light
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=4
          bash examples/load_onnx_light_time/build.sh \
            "${PWD}/build/install-examples" \
            "${PWD}/build/examples-lib" \
            "${PWD}/build/examples/load_onnx_light_time"

      - name: Build C++ example - run_add_node_test
        working-directory: onnx-light
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=4
          bash examples/run_add_node_test/build.sh \
            "${PWD}/build/install-examples" \
            "${PWD}/build/examples-lib" \
            "${PWD}/build/examples/run_add_node_test"

      - name: Build C++ example - run_backend_test_ort
        working-directory: onnx-light
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=4
          bash examples/run_backend_test_ort/build.sh \
            "${PWD}/build/install-examples" \
            "${PWD}/build/examples-lib" \
            "${PWD}/build/examples/run_backend_test_ort"

      - name: Build C++ example - save_onnx_light_time
        working-directory: onnx-light
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=4
          bash examples/save_onnx_light_time/build.sh \
            "${PWD}/build/install-examples" \
            "${PWD}/build/examples-lib" \
            "${PWD}/build/examples/save_onnx_light_time"

      - name: Build onnx-light
        working-directory: onnx-light
        run: CMAKE_BUILD_PARALLEL_LEVEL=8 pip install -e .[dev]

      - name: Build C++ example - load_onnx_time
        working-directory: onnx-light
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=4
          bash examples/load_onnx_time/build.sh \
            "${PWD}/build/install-examples" \
            "${PWD}/build/examples-lib" \
            "${PWD}/build/examples/load_onnx_time"

      - name: Build documentation
        working-directory: onnx-light
        env:
          # Signal to the documentation build that the C++ examples have
          # been compiled in CI so their artefacts/logs can be included.
          CICPP: "1"
          # Persist the ci_durations REST API cache inside the onnx-light
          # checkout (see ``docs/ci_durations.rst``) so it can be committed
          # and reused across documentation builds.
          ONNX_LIGHT_DOCS_CACHE_IN_REPO: "1"
          # ``ci_durations.rst`` resolves the in-repo cache root via
          # ``GITHUB_WORKSPACE`` (falling back to ``os.getcwd()``). On this
          # workflow ``GITHUB_WORKSPACE`` points at the xadupre.github.io
          # checkout, not at the onnx-light one, so override it here.
          GITHUB_WORKSPACE: ${{ github.workspace }}/onnx-light
        run: python -m sphinx docs dist/html -j 4

      - name: Build onnx-light wheel and record its size
        working-directory: onnx-light
        run: |
          # Build a binary wheel for onnx-light so that the size of the
          # distributable package can be tracked over time alongside the
          # individual shared library sizes recorded below. The wheel is
          # built into ``build/wheel`` and its size (in bytes) is appended
          # as a CSV row to ``cache_data/onnx-light/wheel_sizes.csv`` in the
          # xadupre.github.io checkout, so that the "Commit and push updated
          # documentation" step below picks it up.
          export CMAKE_BUILD_PARALLEL_LEVEL=4
          wheel_dir="${PWD}/build/wheel"
          rm -rf "$wheel_dir"
          mkdir -p "$wheel_dir"
          pip wheel . --no-deps --no-build-isolation -w "$wheel_dir"
          out_dir="${GITHUB_WORKSPACE}/site/cache_data/onnx-light"
          mkdir -p "$out_dir"
          out="${out_dir}/wheel_sizes.csv"
          if [ ! -f "$out" ]; then
            echo "date,commit,size,name" > "$out"
          fi
          date_iso="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          commit_sha="$(git rev-parse HEAD)"
          found=0
          for f in "$wheel_dir"/*.whl; do
            [ -e "$f" ] || continue
            size="$(wc -c < "$f")"
            name="$(basename "$f")"
            echo "${date_iso},${commit_sha},${size},${name}" >> "$out"
            found=1
            echo "Recorded ${name} (${size} bytes) at ${commit_sha}."
          done
          if [ "$found" -eq 0 ]; then
            echo "No wheel produced for onnx-light; failing." >&2
            exit 1
          fi

      - name: Record onnx_py shared library sizes
        working-directory: onnx-light
        run: |
          # Record the size of every shared library produced in onnx_py/ so
          # that the evolution of the compiled extension size can be tracked
          # over time. The data is appended (one CSV row per .so file) to
          # cache_data/onnx-light/so_sizes.csv inside the xadupre.github.io
          # checkout so that the existing "Commit and push updated
          # documentation" step below picks it up and pushes it back to this
          # repository.
          out_dir="${GITHUB_WORKSPACE}/site/cache_data/onnx-light"
          mkdir -p "$out_dir"
          out="${out_dir}/so_sizes.csv"
          if [ ! -f "$out" ]; then
            echo "date,commit,size,name" > "$out"
          fi
          date_iso="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          commit_sha="$(git rev-parse HEAD)"
          found=0
          # Track every shared library shipped in the onnx_py package (.so on
          # Linux/macOS, .dylib on macOS, .pyd on Windows just in case).
          while IFS= read -r -d '' f; do
            size="$(wc -c < "$f")"
            name="$(basename "$f")"
            echo "${date_iso},${commit_sha},${size},${name}" >> "$out"
            found=1
            echo "Recorded ${name} (${size} bytes) at ${commit_sha}."
          done < <(find onnx_light/onnx_py -maxdepth 2 -type f \( -name '*.so' -o -name '*.so.*' -o -name '*.dylib' -o -name '*.pyd' \) -print0)
          if [ "$found" -eq 0 ]; then
            echo "No shared library found under onnx_light/onnx_py/; failing." >&2
            exit 1
          fi

      - name: Copy documentation into site/docs/onnx-light
        run: |
          rm -rf site/docs/onnx-light
          mkdir -p site/docs/onnx-light
          cp -r onnx-light/dist/html/. site/docs/onnx-light/
          # Disable Jekyll so that files/folders starting with "_" are served by GitHub Pages.
          touch site/docs/onnx-light/.nojekyll

      - name: Commit and push updated documentation
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/onnx-light cache_data/onnx-light
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
          else
            built_sha="$(git -C ../onnx-light rev-parse HEAD)"
            git commit -m "Update onnx-light documentation (from ${built_sha})"
            # Retry the push a few times, rebasing on top of any new commits
            # that may have landed on the remote in the meantime. This avoids
            # "fetch first" / non-fast-forward push failures when another
            # workflow run pushed to the same branch concurrently.
            branch="${GITHUB_REF_NAME:-main}"
            attempts=5
            for i in $(seq 1 "$attempts"); do
              if git push origin "HEAD:${branch}"; then
                echo "Push succeeded on attempt ${i}."
                exit 0
              fi
              echo "Push attempt ${i} failed; rebasing on origin/${branch} and retrying..."
              git fetch origin "${branch}"
              # Rebase our single doc commit on top of the latest remote state.
              # Prefer our version for the generated docs directory in case of
              # conflicts, since we just rebuilt it.
              if ! git rebase -X ours "origin/${branch}"; then
                echo "Rebase failed; aborting."
                git rebase --abort || true
                exit 1
              fi
              sleep $((i * 5))
            done
            echo "Failed to push after ${attempts} attempts." >&2
            exit 1
          fi
