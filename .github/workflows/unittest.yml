name: Unit tests

# Run the Python unit tests under ``scripts/tests`` on Ubuntu for every push
# and pull request targeting the main branch.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout xadupre.github.io
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install onnx

      - name: Run unit tests
        run: |
          python -m unittest discover -s scripts/tests -v
