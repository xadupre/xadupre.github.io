name: Record build durations

# Periodically records the duration of GitHub Actions workflow runs for the
# tracked repositories and caches the data as CSV files under
# ``cache_data/<repo>/build_durations.csv``. Only the repository owner is
# allowed to actually perform the recording so that runs triggered by other
# actors will see the job skipped.

on:
  schedule:
    # Run once a week, Monday at 04:17 UTC. The odd minute avoids the load
    # spikes that happen exactly on the hour.
    - cron: "17 4 * * 1"
  workflow_dispatch:
    inputs:
      months:
        description: "Number of months to look back when the cache is empty."
        required: false
        default: "6"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

jobs:
  record:
    if: github.event_name == 'schedule' || github.actor == github.repository_owner
    runs-on: ubuntu-latest
    # The bootstrap fetch for very active repositories (notably ``onnx/onnx``,
    # which can produce thousands of workflow runs per 6 months) does not fit
    # in 30 minutes. Once the per-repo cache has been seeded, subsequent runs
    # only need to fetch the incremental delta and complete in a few minutes,
    # but the first run needs a much larger budget. GitHub-hosted runners
    # allow up to 6 hours per job; cap a bit below that to leave headroom for
    # the surrounding steps (checkout, commit, push).
    timeout-minutes: 350
    steps:
      - name: Checkout xadupre.github.io
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Record build durations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Gathering CI durations ==="
          echo "Repository : ${{ github.repository }}"
          echo "Triggered  : ${{ github.event_name }} (actor=${{ github.actor }})"
          echo "Months     : ${{ inputs.months || '6' }}"
          echo "This step queries the GitHub Actions API for each tracked"
          echo "repository, downloads the workflow runs created since the most"
          echo "recent entry in cache_data/<repo>/build_durations.csv, and"
          echo "appends the new rows (plus per-job rows under"
          echo "cache_data/<repo>/jobs/<job_name>.csv)."
          echo "=============================="
          python -u scripts/record_build_durations.py \
            --months "${{ inputs.months || '6' }}"

      - name: Commit and push cache data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cache_data
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update build duration cache"
          branch="${GITHUB_REF_NAME:-main}"
          attempts=5
          for i in $(seq 1 "$attempts"); do
            if git push origin "HEAD:${branch}"; then
              echo "Push succeeded on attempt ${i}."
              exit 0
            fi
            echo "Push attempt ${i} failed; rebasing on origin/${branch} and retrying..."
            # When the previous step was cancelled by a timeout, the Python
            # process may still be flushing CSV files to ``cache_data`` while
            # this step runs. Fold any such late writes into the existing
            # commit (so they are not lost) and then make sure the working
            # tree is clean before rebasing, otherwise ``git rebase`` aborts
            # with "cannot rebase: You have unstaged changes." and the
            # partial cache data is never pushed.
            git add cache_data || true
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit || true
            fi
            git stash push --include-untracked --quiet || true
            # Belt-and-braces: discard anything the stash could not capture
            # (for example files written after the stash returned) so that
            # the rebase below always starts from a clean working tree.
            git checkout -- . || true
            git clean -fd cache_data || true
            git fetch origin "${branch}"
            if ! git rebase -X ours "origin/${branch}"; then
              echo "Rebase failed; aborting."
              git rebase --abort || true
              exit 1
            fi
            sleep $((i * 5))
          done
          echo "Failed to push after ${attempts} attempts." >&2
          exit 1
