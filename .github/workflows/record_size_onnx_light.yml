name: Record onnx-light size

# Runs on a weekly schedule and can also be triggered manually. Only the
# repository owner (xadupre) is allowed to actually run the build when it is
# triggered manually; any other actor will see the job skipped. Scheduled
# runs always proceed because they are initiated by GitHub itself.
on:
  schedule:
    # Run once a week, Monday at 05:17 UTC. The odd minute avoids the load
    # spikes that happen exactly on the hour, and the hour is offset from the
    # other weekly recording workflow (record_build_durations) so they do not
    # compete for the same runner slot.
    - cron: "17 5 * * 1"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag or SHA) of xadupre/onnx-light to build"
        required: false
        default: "main"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-publish:
    # Only the repository owner is allowed to publish documentation, but
    # scheduled runs (initiated by GitHub itself) are always allowed.
    if: github.event_name == 'schedule' || github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout xadupre.github.io
        uses: actions/checkout@v6
        with:
          path: site
          # Full history so that we can rebase on top of any concurrent
          # commits to the default branch before pushing the rebuilt docs.
          fetch-depth: 0

      - name: Checkout onnx-light
        uses: actions/checkout@v6
        with:
          repository: xadupre/onnx-light
          ref: ${{ inputs.ref || 'main' }}
          path: onnx-light

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: pip freeze
        run: pip freeze

      - name: Install onnx-light with doc dependencies
        working-directory: onnx-light
        run: |
          export CMAKE_BUILD_PARALLEL_LEVEL=4
          # ``onnx`` is required so that
          # ``onnx_light.schema_comparison.compute_schema_comparison()`` can
          # populate the ``onnx``-side columns of the per-operator comparison
          # table consumed by the dashboard (otherwise it would silently
          # report empty columns for the reference package).
          python -m pip install setuptools nanobind numpy ml-dtypes onnx
          python setup.py build_ext --inplace

      - name: ls
        working-directory: onnx-light
        run: ls onnx_light/onnx_py

      - name: Record onnx_py shared library sizes
        working-directory: onnx-light
        run: |
          # Record the size of every shared library produced in onnx_py/ so
          # that the evolution of the compiled extension size can be tracked
          # over time. The data is appended (one CSV row per .so file) to
          # cache_data/onnx-light/so_sizes.csv inside the xadupre.github.io
          # checkout so that the existing "Commit and push updated
          # documentation" step below picks it up and pushes it back to this
          # repository.
          out_dir="${GITHUB_WORKSPACE}/site/cache_data/onnx-light"
          mkdir -p "$out_dir"
          out="${out_dir}/so_sizes.csv"
          if [ ! -f "$out" ]; then
            echo "date,commit,size,name" > "$out"
          fi
          date_iso="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          commit_sha="$(git rev-parse HEAD)"
          found=0
          # Track every shared library shipped in the onnx_py package (.so on
          # Linux/macOS, .dylib on macOS, .pyd on Windows just in case).
          while IFS= read -r -d '' f; do
            size="$(wc -c < "$f")"
            name="$(basename "$f")"
            echo "${date_iso},${commit_sha},${size},${name}" >> "$out"
            found=1
            echo "Recorded ${name} (${size} bytes) at ${commit_sha}."
          done < <(find onnx_light/onnx_py -maxdepth 2 -type f \( -name '*.so' -o -name '*.so.*' -o -name '*.dylib' -o -name '*.pyd' \) -print0)
          if [ "$found" -eq 0 ]; then
            echo "No shared library found under onnx_light/onnx_py/; nothing to record."
          fi

      - name: Record schema comparison snapshot
        working-directory: onnx-light
        env:
          OUT: ${{ github.workspace }}/site/cache_data/onnx-light/schema_comparison.json
        run: |
          # Dump the latest per-operator comparison between ``onnx`` and
          # ``onnx_light`` schemas (one row per (domain, operator)) as JSON
          # so that the interactive dashboard at
          # dashboard/onnx-light/schema-comparison.html can render one
          # searchable / sortable table per domain without needing Sphinx.
          mkdir -p "$(dirname "$OUT")"
          export DATE_ISO="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          export COMMIT_SHA="$(git rev-parse HEAD)"
          python - <<'PY'
          import json
          import os
          from dataclasses import asdict

          from onnx_light.schema_comparison import compute_schema_comparison

          comparison = compute_schema_comparison()
          payload = {
              "date": os.environ["DATE_ISO"],
              "commit": os.environ["COMMIT_SHA"],
              "onnx_available": comparison.onnx_available,
              "totals": {
                  "onnx": comparison.total_onnx,
                  "onnx_light": comparison.total_onnx_light,
                  "onnx_shape_inference": comparison.total_onnx_shape_inference,
                  "onnx_light_shape_inference": comparison.total_onnx_light_shape_inference,
                  "onnx_backend_tests": comparison.total_onnx_backend_tests,
                  "onnx_light_backend_tests": comparison.total_onnx_light_backend_tests,
              },
              "rows": [asdict(r) for r in comparison.rows],
          }
          out = os.environ["OUT"]
          with open(out, "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2, sort_keys=True)
          print(
              "Wrote {} rows ({} domains) to {}".format(
                  len(payload["rows"]),
                  len({r["domain"] for r in payload["rows"]}),
                  out,
              )
          )
          PY

      - name: Commit and push cache data
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/onnx-light cache_data/onnx-light
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            built_sha="$(git -C ../onnx-light rev-parse HEAD)"
            git commit -m "Update onnx-light documentation (from ${built_sha})"
            # Retry the push a few times, rebasing on top of any new commits
            # that may have landed on the remote in the meantime. This avoids
            # "fetch first" / non-fast-forward push failures when another
            # workflow run pushed to the same branch concurrently.
            branch="${GITHUB_REF_NAME:-main}"
            attempts=5
            for i in $(seq 1 "$attempts"); do
              if git push origin "HEAD:${branch}"; then
                echo "Push succeeded on attempt ${i}."
                exit 0
              fi
              echo "Push attempt ${i} failed; rebasing on origin/${branch} and retrying..."
              # Drop any leftover working-tree or untracked changes so that
              # the rebase below does not abort with "cannot rebase: You
              # have unstaged changes." Everything we want to publish has
              # already been committed above, so any remainder is safe to
              # set aside.
              git stash push --include-untracked --quiet -- || true
              git fetch origin "${branch}"
              # Rebase our single doc commit on top of the latest remote state.
              # Prefer our version for the generated docs directory in case of
              # conflicts, since we just rebuilt it.
              if ! git rebase -X ours "origin/${branch}"; then
                echo "Rebase failed; aborting."
                git rebase --abort || true
                exit 1
              fi
              sleep $((i * 5))
            done
            echo "Failed to push after ${attempts} attempts." >&2
            exit 1
          fi
