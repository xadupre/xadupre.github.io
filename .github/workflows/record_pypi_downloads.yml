name: Record PyPI downloads

# Weekly job that records the number of PyPI downloads (last day / week /
# month) for the ONNX-related packages tracked by this repository. The
# data is fetched from pypistats.org and cached as CSV files under
# ``cache_data/<package>/downloads.csv``. Only the repository owner is
# allowed to run the job manually; scheduled runs always proceed because
# they are initiated by GitHub itself.

on:
  schedule:
    # Run once a week, Monday at 06:43 UTC. The odd minute avoids the load
    # spikes that happen exactly on the hour, and the time is offset from
    # the other weekly recording workflows so they do not compete for the
    # same runner slot.
    - cron: "43 6 * * 1"
  workflow_dispatch:
    inputs:
      packages:
        description: "Space-separated list of PyPI packages to inspect (default: all tracked packages)."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  record:
    if: github.event_name == 'schedule' || github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout xadupre.github.io
        uses: actions/checkout@v6
        with:
          # Full history so that we can rebase on top of any concurrent
          # commits to the default branch before pushing the new rows.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Record PyPI downloads
        run: |
          set -e
          args=()
          if [ -n "${{ inputs.packages }}" ]; then
            for pkg in ${{ inputs.packages }}; do
              args+=("--package" "$pkg")
            done
          fi
          python -u scripts/record_pypi_downloads.py "${args[@]}"

      - name: Commit and push cache data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cache_data
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update PyPI downloads cache"
          branch="${GITHUB_REF_NAME:-main}"
          attempts=5
          for i in $(seq 1 "$attempts"); do
            if git push origin "HEAD:${branch}"; then
              echo "Push succeeded on attempt ${i}."
              exit 0
            fi
            echo "Push attempt ${i} failed; rebasing on origin/${branch} and retrying..."
            git fetch origin "${branch}"
            if ! git rebase -X ours "origin/${branch}"; then
              echo "Rebase failed; aborting."
              git rebase --abort || true
              exit 1
            fi
            sleep $((i * 5))
          done
          echo "Failed to push after ${attempts} attempts." >&2
          exit 1
