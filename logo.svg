<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Xavier Dupré logo">
  <title>Xavier Dupré</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0366d6"/>
      <stop offset="100%" stop-color="#0a4ea6"/>
    </linearGradient>
    <clipPath id="tamis">
      <path d="M 60 22 A 34 38 0 1 1 60 98 Z"/>
    </clipPath>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="22" fill="url(#g)"/>
  <!-- Racket tilted ~ -20deg to look "tordue" -->
  <g transform="rotate(-20 64 64)">
    <!-- Handle: one branch of the X extends down as the grip -->
    <line x1="60" y1="60" x2="22" y2="118" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <!-- Grip wrap marks -->
    <g stroke="#0a4ea6" stroke-width="1.2" opacity="0.7">
      <line x1="30" y1="106" x2="36" y2="110"/>
      <line x1="34" y1="100" x2="40" y2="104"/>
      <line x1="38" y1="94" x2="44" y2="98"/>
      <line x1="42" y1="88" x2="48" y2="92"/>
    </g>
    <!-- Other branches of the X (shorter, like racket throat / yoke) -->
    <line x1="60" y1="60" x2="44" y2="44" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
    <line x1="60" y1="60" x2="80" y2="46" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <line x1="60" y1="60" x2="78" y2="82" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <!-- Strings (tamis) inside the D -->
    <g clip-path="url(#tamis)" stroke="#ffffff" stroke-width="1" opacity="0.75">
      <line x1="30" y1="28" x2="100" y2="28"/>
      <line x1="30" y1="36" x2="100" y2="36"/>
      <line x1="30" y1="44" x2="100" y2="44"/>
      <line x1="30" y1="52" x2="100" y2="52"/>
      <line x1="30" y1="60" x2="100" y2="60"/>
      <line x1="30" y1="68" x2="100" y2="68"/>
      <line x1="30" y1="76" x2="100" y2="76"/>
      <line x1="30" y1="84" x2="100" y2="84"/>
      <line x1="30" y1="92" x2="100" y2="92"/>
      <line x1="38" y1="20" x2="38" y2="100"/>
      <line x1="46" y1="20" x2="46" y2="100"/>
      <line x1="54" y1="20" x2="54" y2="100"/>
      <line x1="62" y1="20" x2="62" y2="100"/>
      <line x1="70" y1="20" x2="70" y2="100"/>
      <line x1="78" y1="20" x2="78" y2="100"/>
      <line x1="86" y1="20" x2="86" y2="100"/>
    </g>
    <!-- D-shaped racket head frame (the tamis is the D) -->
    <path d="M 60 22 A 34 38 0 1 1 60 98 Z" fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>
    <!-- Vertical bar of the D, doubles as racket head left edge -->
    <line x1="60" y1="22" x2="60" y2="98" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
